<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Voice Reader</h1>
            <p>Converti il tuo testo in voce</p>
        </header>
        
        <main>
            <div class="input-section">
                <label for="text-input">Testo da leggere:</label>
                <textarea id="text-input" placeholder="Incolla qui il tuo testo..."></textarea>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label for="voice-select">Voce:</label>
                    <select id="voice-select"></select>
                </div>
                <div class="control-group">
                    <label for="rate">Velocità:</label>
                    <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
                    <span id="rate-value">1x</span>
                </div>
                <div class="control-group">
                    <label for="pitch">Tono:</label>
                    <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
                    <span id="pitch-value">1x</span>
                </div>
                <div class="control-group">
                    <label for="volume">Volume:</label>
                    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
                    <span id="volume-value">100%</span>
                </div>
            </div>
            
            <div class="buttons">
                <button id="speak-btn" class="btn primary">▶ Leggi</button>
                <button id="pause-btn" class="btn secondary" disabled>⏸ Pausa</button>
                <button id="stop-btn" class="btn secondary" disabled>⏹ Stop</button>
                <button id="download-btn" class="btn secondary">⬇ Scarica MP3</button>
            </div>
            
            <div class="status" id="status">Pronto</div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
